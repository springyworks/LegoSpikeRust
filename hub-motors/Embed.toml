# probe-rs configuration for LEGO SPIKE Prime Hub (STM32F413VGTx)
# Usage: cargo embed [--release]
# Requires: SWD access (see README for PA13/SWDIO note)

[default.general]
chip = "STM32F413VGTx"

[default.flashing]
enabled = true
# Sector erase only — preserve LEGO bootloader at 0x08000000-0x08007FFF
restore_unwritten_bytes = true

[default.rtt]
enabled = true

[default.reset]
enabled = true
halt_afterwards = false

[default.gdb]
enabled = false
